version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - goimports
    - gofmt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - gosec
    - unconvert
    - unparam
    - gocyclo
    - whitespace

  settings:
    gocyclo:
      min-complexity: 40

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc

    revive:
      rules:
        - name: exported
          arguments: [checkPrivateReceivers]

    gosec:
      excludes:
        - G204
        - G304
        - G306
        - G703

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gosec
          - errcheck
          - revive

